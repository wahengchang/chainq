# 逐項處理（splitOut → 鏈 → aggregate）範例 —— chainq「不用 loop 容器」就能跑迴圈。
#
#   trigger(input) ─→ brainstorm(ai+schema，產一個陣列) ─→ each(splitOut，一個元素一個 item)
#                                                              └─→ expand(ai，逐項展開) ─→ collect(aggregate，收回成一個陣列) ─→ result(write)
#
# 重點是「對一串清單逐項處理、再合回來」這個能力：
#   • splitOut  把上游 item 的某個陣列欄位攤平成「一項一個 item」（fan-out）。
#   • 中間的 ai／cmd／assemble 會「每個 item 各跑一次」。
#   • aggregate 把這串 item 全部收回成「一個 item，裝著陣列」（fan-in）。
# 這就是 n8n 的 Split Out → … → Aggregate；chainq 刻意不做 loop 容器，這條鏈已能表達。
#
# 在編輯器裡點開 each / collect 看看：它們是「整批 collection 運算」，沒有 prompt 欄位，
# 面板只給該節點真正會用到的設定（splitOut/aggregate 是 field，不是 prompt）。
#
# 跑（brainstorm/expand 會呼叫真實模型，需先 claude login）：
#   chainq run examples/split-aggregate.yaml
# 或在編輯器裡開：
#   chainq ui examples/split-aggregate.yaml
profiles:
  default: { cmd: 'claude -p' }

steps:
  # 觸發點：給一個主題
  trigger:
    type: input
    params:
      topic:
        type: string
        default: '週末在澳門的小旅行'

  # 產出一個「陣列」：schema 宣告 ideas 是 array，輸出會被解析成真正的 JSON 陣列
  brainstorm:
    type: ai
    from: trigger
    schema:
      ideas: array
    prompt: |
      針對主題「{{ $json.topic }}」想出 3 個點子。
      只回傳這個 JSON 物件，不要任何說明或程式碼框：{"ideas": ["點子一", "點子二", "點子三"]}

  # splitOut：把 ideas 這個陣列攤平 —— 一個點子變成一個 item（之後逐項各跑一次）
  each:
    type: splitOut
    from: brainstorm
    field: ideas

  # 逐項展開：這個 ai 會「每個點子各跑一次」，把點子寫成一句話
  expand:
    type: ai
    from: each
    prompt: '把這個點子擴寫成一句吸引人的繁中短句（只回短句本身）：{{ $json }}'

  # aggregate：把上面那串 item 全部收回成「一個 item，裝著一個陣列」
  collect:
    type: aggregate
    from: expand

  # 落地：把收回來的內容寫成檔
  result:
    type: write
    from: collect
    path: out/ideas.md
    mode: overwrite
