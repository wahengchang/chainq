# Mock: a cmd that reads a file (tests cwd + declared-input caching) → ai.
# The scenario writes in.txt next to it before running.
profiles:
  default: { cmd: 'claude -p' }
steps:
  load: { type: cmd, run: 'cat in.txt', inputs: [ 'in.txt' ] }
  sum: { type: ai, from: step, prompt: '{{ $json }}' }
  step:
    type: ai
    prompt: new step
    from: step2
  step2:
    type: ai
    prompt: new step
    from: load
