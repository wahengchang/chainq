<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>chain</title>
<style>
  :root{--bg:#0e0f11;--panel:#15171a;--panel2:#101214;--line:#2a2d31;--ink:#d7dadd;--dim:#7f868d;
    --accent:#e0a64d;--ran:#5db07e;--cached:#6b7177;--bad:#e0635b;
    --mono:"Berkeley Mono","JetBrains Mono",ui-monospace,Menlo,monospace;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:13px;line-height:1.5}
  header{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--panel)}
  header b{font-weight:normal} header .sub{color:var(--dim);font-size:11px}
  .wrap{max-width:920px;margin:0 auto;padding:28px 18px}
  h2{font-weight:normal;font-size:15px;margin:0 0 4px}
  .hint{color:var(--dim);font-size:12px;margin-bottom:18px}
  label{display:block;color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 4px}
  input,textarea,select,button{font:inherit;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:3px;padding:7px 10px}
  input,textarea{width:100%} textarea{white-space:pre;overflow:auto;tab-size:2}
  button{cursor:pointer;background:transparent} button:hover{border-color:var(--accent)}
  button.primary{border-color:var(--accent);color:var(--accent)}
  .row{display:flex;gap:8px;align-items:center}
  .flows{margin:8px 0;border:1px solid var(--line);border-radius:3px}
  .flow{padding:7px 11px;cursor:pointer;border-bottom:1px solid #1b1e22}
  .flow:last-child{border-bottom:0} .flow:hover{background:#1b1e22;color:var(--accent)}
  .empty{padding:18px;text-align:center;color:var(--dim)}
  .msg{margin-top:10px;font-size:12px;white-space:pre-wrap}
  .msg.ok{color:var(--ran)} .msg.err{color:var(--bad)}
  .hidden{display:none}
  /* editor */
  .bar{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--line);background:var(--panel)}
  .bar .path{color:var(--dim);font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .body{display:grid;grid-template-columns:1fr 380px;height:calc(100vh - 98px)}
  /* node graph */
  .canvas{padding:26px;overflow:auto;background:radial-gradient(circle,var(--panel2) 1px,transparent 1px);background-size:22px 22px}
  .flowrow{display:flex;align-items:flex-start;flex-wrap:wrap;gap:0}
  .node{width:190px;background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:10px 12px;cursor:pointer;transition:all .15s}
  .node:hover{border-color:var(--accent)}
  .node.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .node.ran{border-left:3px solid var(--ran)} .node.cached{border-left:3px solid var(--cached)}
  .node.failed{border-left:3px solid var(--bad)} .node.skipped{opacity:.6}
  .nh{display:flex;align-items:center;gap:8px} .nn{flex:1} .nt{color:var(--dim);font-size:10px}
  .glyph{width:14px;text-align:center}
  .g-ran{color:var(--ran)} .g-cached{color:var(--cached)} .g-failed{color:var(--bad)} .g-skipped{color:var(--dim)} .g-pending{color:var(--dim)}
  .npreview{color:var(--dim);font-size:11px;margin-top:6px;max-height:32px;overflow:hidden}
  .arrow{align-self:center;color:var(--dim);padding:0 8px}
  .addnode{margin-top:16px}
  /* edit panel */
  .panel{border-left:1px solid var(--line);background:var(--panel);padding:14px 16px;overflow:auto;display:flex;flex-direction:column}
  .panel h3{font-weight:normal;color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 6px}
  .panel h3:first-child{margin-top:0}
  #pnPrompt{min-height:160px;white-space:pre-wrap}
  .out{white-space:pre-wrap;word-break:break-word;background:var(--bg);border:1px solid var(--line);border-radius:3px;padding:8px 10px;font-size:12px;min-height:40px}
  .out.err{color:var(--bad);border-color:var(--bad)}
  .raw textarea{height:calc(100vh - 98px);width:100%;border:0;border-radius:0;min-height:0}
</style></head>
<body>
<header><b>chain</b><span class="sub">create a project · edit a chain</span></header>

<!-- ───────── CREATE ───────── -->
<div id="create" class="wrap">
  <h2>Start a chain</h2>
  <div class="hint">Pick a folder, name a flow, create it — then edit.</div>
  <label>Target folder</label>
  <div class="row"><input id="dir" placeholder="/path/to/project"><button onclick="listFlows()">List</button></div>
  <div id="flows" class="flows hidden"></div>
  <label>New flow name</label>
  <div class="row"><input id="name" placeholder="my-flow" onkeydown="if(event.key==='Enter')createFlow()"><button class="primary" onclick="createFlow()">Create →</button></div>
  <div id="createMsg" class="msg"></div>
</div>

<!-- ───────── EDITOR ───────── -->
<div id="editor" class="hidden">
  <div class="bar">
    <button onclick="back()">← projects</button>
    <span class="path" id="path"></span>
    <button onclick="toggleRaw()" id="rawBtn">{ } raw</button>
    <select id="profile"><option value="fake">fake (offline)</option><option value="">default (claude -p)</option></select>
    <button class="primary" onclick="run()">▷ Run all</button>
  </div>

  <!-- NODE VIEW -->
  <div id="nodeView" class="body">
    <div class="canvas">
      <div id="graph" class="flowrow"></div>
      <div class="addnode"><button onclick="addNode()">+ add ai step</button></div>
      <div id="canvasMsg" class="msg"></div>
    </div>
    <div class="panel" id="panel">
      <div id="panelEmpty" class="dim">Click a node to edit its prompt.</div>
      <div id="panelBody" class="hidden">
        <h3>node · <span id="pnId"></span> <span id="pnType" class="nt"></span></h3>
        <label id="pnLabel">prompt</label>
        <textarea id="pnPrompt" spellcheck="false" placeholder="write the prompt for this step…"></textarea>
        <div class="row" style="margin-top:8px">
          <button class="primary" onclick="saveNode()">Save node</button>
          <button onclick="runNode()">▷ Run this</button>
        </div>
        <div id="pnMsg" class="msg"></div>
        <h3>output</h3>
        <div id="pnOut" class="out dim">Run to see this node's output.</div>
      </div>
    </div>
  </div>

  <!-- RAW VIEW -->
  <div id="rawView" class="raw hidden">
    <textarea id="yaml" spellcheck="false"></textarea>
    <div class="bar"><button class="primary" onclick="saveRaw()">Save raw YAML</button><span id="rawMsg" class="msg"></span></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const api = (u, o) => fetch(u, o).then(async r => ({ ok:r.ok, status:r.status, data: await r.json().catch(()=>({})) }));
const esc = s => (s==null?"":String(s)).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const G = { ran:"✓", cached:"⊘", failed:"✗", skipped:"–", pending:"○" };
let current=null, nodes=[], selected=null, results={};

async function boot(){ const {data}=await api("/api/context"); $("dir").value=data.cwd; if(data.initialFlow) return open(data.initialFlow); listFlows(); }

async function listFlows(){
  const {data}=await api("/api/list?dir="+encodeURIComponent($("dir").value));
  $("dir").value=data.dir; const box=$("flows"); box.classList.remove("hidden");
  if(!data.flows.length){ box.innerHTML='<div class="empty">empty — create your first flow below</div>'; return; }
  box.innerHTML=data.flows.map(f=>'<div class="flow" data-f="'+f+'">'+f+'</div>').join("");
  box.querySelectorAll(".flow").forEach(el=>el.onclick=()=>open(data.dir.replace(/\/$/,"")+"/"+el.dataset.f));
}
async function createFlow(){
  const name=$("name").value.trim(); if(!name) return setMsg("createMsg","err","name required");
  const {ok,data}=await api("/api/create",{method:"POST",body:JSON.stringify({dir:$("dir").value,name})});
  if(!ok) return setMsg("createMsg","err",data.error||"create failed"); open(data.path);
}

async function open(path){
  current=path; selected=null; results={};
  $("path").textContent=path;
  $("create").classList.add("hidden"); $("editor").classList.remove("hidden");
  showNodes();
  await loadNodes();
}
function back(){ $("editor").classList.add("hidden"); $("create").classList.remove("hidden"); listFlows(); }

async function loadNodes(){
  const {ok,data}=await api("/api/parse?path="+encodeURIComponent(current));
  if(!ok){ setMsg("canvasMsg","err","could not parse flow — use { } raw to fix it"); $("graph").innerHTML=""; return; }
  setMsg("canvasMsg","",""); nodes=data.nodes; renderGraph();
}
function renderGraph(){
  const g=$("graph"); g.innerHTML="";
  nodes.forEach((n,i)=>{
    if(i>0){ const a=document.createElement("div"); a.className="arrow"; a.textContent="→"; g.appendChild(a); }
    const r=results[n.id];
    const d=document.createElement("div");
    d.className="node "+(r?r.status:"")+(selected===n.id?" sel":"");
    const glyph=r?('<span class="glyph g-'+r.status+'">'+G[r.status]+'</span>'):'<span class="glyph g-pending">○</span>';
    const preview=esc((n.prompt||n.run||"").slice(0,70));
    d.innerHTML='<div class="nh">'+glyph+'<span class="nn">'+n.id+'</span><span class="nt">'+n.type+'</span></div><div class="npreview">'+preview+'</div>';
    d.onclick=()=>selectNode(n.id);
    g.appendChild(d);
  });
}
function selectNode(id){
  selected=id; const n=nodes.find(x=>x.id===id); if(!n) return;
  $("panelEmpty").classList.add("hidden"); $("panelBody").classList.remove("hidden");
  $("pnId").textContent=n.id; $("pnType").textContent=n.type;
  const isCmd=n.type==="cmd";
  $("pnLabel").textContent=isCmd?"command (run)":"prompt";
  $("pnPrompt").value=isCmd?(n.run||""):(n.prompt||"");
  const r=results[n.id];
  $("pnOut").className="out"+(r&&r.status==="failed"?" err":(r?"":" dim"));
  $("pnOut").textContent=r?(r.error||r.output||"(empty)"):"Run to see this node's output.";
  setMsg("pnMsg","",""); renderGraph();
}
async function saveNode(){
  const n=nodes.find(x=>x.id===selected); if(!n) return;
  const field=n.type==="cmd"?"run":"prompt";
  const {ok,data}=await api("/api/set",{method:"POST",body:JSON.stringify({path:current,node:selected,field,value:$("pnPrompt").value})});
  if(!ok) return setMsg("pnMsg","err",(data.errors||[]).map(e=>"✗ "+e.node+": "+e.message).join("\n")||"save failed");
  setMsg("pnMsg","ok","saved ✓"); await loadNodes(); selectNode(selected);
}
function runNode(){ run(); }           // (per-node run is a later step; run all for now)

async function addNode(){
  // append a new ai step to the YAML via raw, simplest reliable path
  const read=await api("/api/read?path="+encodeURIComponent(current));
  let y=read.data.yaml||""; let i=1, id; do{ id="step"+(nodes.length+i); i++; }while(nodes.some(n=>n.id===id));
  const last=nodes.length?nodes[nodes.length-1].id:null;
  y=y.replace(/\s*$/,"\n")+"  "+id+":\n    type: ai\n"+(last?("    from: "+last+"\n"):"")+"    prompt: 'new step'\n";
  const {ok,data}=await api("/api/save",{method:"POST",body:JSON.stringify({path:current,yaml:y})});
  if(!ok) return setMsg("canvasMsg","err","add failed"); await loadNodes(); selectNode(id);
}

async function run(){
  $("graph") && setMsg("canvasMsg","","");
  const {ok,data}=await api("/api/run",{method:"POST",body:JSON.stringify({path:current,profile:$("profile").value})});
  if(!ok){ setMsg("canvasMsg","err",(data.errors||[]).map(e=>"✗ "+e.node+": "+e.message).join("\n")||"run failed"); return; }
  results={}; data.results.forEach(r=>results[r.id]={status:r.status,output:r.output,error:r.error});
  renderGraph(); if(selected) selectNode(selected);
}

// raw toggle
let rawOn=false;
async function toggleRaw(){
  rawOn=!rawOn;
  if(rawOn){ const {data}=await api("/api/read?path="+encodeURIComponent(current)); $("yaml").value=data.yaml||"";
    $("nodeView").classList.add("hidden"); $("rawView").classList.remove("hidden"); $("rawBtn").textContent="◧ nodes"; }
  else { showNodes(); $("rawBtn").textContent="{ } raw"; loadNodes(); }
}
function showNodes(){ rawOn=false; $("rawView").classList.add("hidden"); $("nodeView").classList.remove("hidden"); $("rawBtn").textContent="{ } raw"; }
async function saveRaw(){
  const {ok,data}=await api("/api/save",{method:"POST",body:JSON.stringify({path:current,yaml:$("yaml").value})});
  setMsg("rawMsg",ok?"ok":"err",ok?"saved ✓":(data.errors||[]).map(e=>"✗ "+e.node+": "+e.message).join("\n"));
}

function setMsg(id,cls,t){ const e=$(id); if(!e)return; e.className="msg "+cls; e.textContent=t; }
boot();
</script>
</body></html>
