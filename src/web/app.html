<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>chain</title>
<style>
  :root{--bg:#0e0f11;--panel:#15171a;--panel2:#101214;--line:#2a2d31;--ink:#d7dadd;--dim:#7f868d;
    --accent:#e0a64d;--ran:#5db07e;--cached:#6b7177;--bad:#e0635b;--pin:#7aa2d6;
    --mono:"Berkeley Mono","JetBrains Mono",ui-monospace,Menlo,monospace;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:13px;line-height:1.5;height:100vh;overflow:hidden}
  header{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--panel)}
  header b{font-weight:normal} header .sub{color:var(--dim);font-size:11px}
  .wrap{max-width:920px;margin:0 auto;padding:28px 18px;overflow:auto}
  h2{font-weight:normal;font-size:15px;margin:0 0 4px}
  .hint{color:var(--dim);font-size:12px;margin-bottom:18px}
  label{display:block;color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 4px}
  input,textarea,select,button{font:inherit;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:3px;padding:7px 10px}
  input,textarea{width:100%} textarea{white-space:pre-wrap;overflow:auto;tab-size:2}
  button{cursor:pointer;background:transparent} button:hover{border-color:var(--accent)}
  button.primary{border-color:var(--accent);color:var(--accent)}
  .row{display:flex;gap:8px;align-items:center}
  .flows{margin:8px 0;border:1px solid var(--line);border-radius:3px}
  .flow{padding:7px 11px;cursor:pointer;border-bottom:1px solid #1b1e22}
  .flow:last-child{border-bottom:0} .flow:hover{background:#1b1e22;color:var(--accent)}
  .empty{padding:18px;text-align:center;color:var(--dim)}
  .msg{margin-top:8px;font-size:12px;white-space:pre-wrap}
  .msg.ok{color:var(--ran)} .msg.err{color:var(--bad)}
  .hidden{display:none}
  /* editor */
  .bar{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--line);background:var(--panel);z-index:3}
  .bar .path{color:var(--dim);font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .stage{position:relative;height:calc(100vh - 49px);overflow:auto;
    background:radial-gradient(circle,var(--panel2) 1px,transparent 1px);background-size:22px 22px}
  .flowrow{display:flex;align-items:flex-start;flex-wrap:wrap;gap:0;padding:30px}
  .node{position:relative;width:200px;background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:11px 13px;cursor:pointer;transition:border-color .15s}
  .node:hover{border-color:var(--accent)}
  .noderun{position:absolute;top:6px;right:6px;padding:0 7px;font-size:12px;line-height:18px;border:1px solid var(--line);border-radius:3px;background:var(--panel2);color:var(--accent);opacity:0;transition:opacity .1s}
  .node:hover .noderun{opacity:1} .noderun:hover{border-color:var(--accent)}
  .node.ran{border-left:3px solid var(--ran)} .node.cached{border-left:3px solid var(--cached)}
  .node.failed{border-left:3px solid var(--bad)} .node.skipped{opacity:.6}
  .node.running{border-left:3px solid var(--accent);animation:pulse 1.1s ease-in-out infinite}
  .g-running{color:var(--accent)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{display:inline-block;animation:spin .8s linear infinite}
  .nh{display:flex;align-items:center;gap:8px} .nn{flex:1} .nt{color:var(--dim);font-size:10px}
  .glyph{width:14px;text-align:center}
  .g-ran{color:var(--ran)} .g-cached{color:var(--cached)} .g-failed{color:var(--bad)} .g-skipped{color:var(--dim)} .g-pending{color:var(--dim)}
  .npreview{color:var(--dim);font-size:11px;margin-top:6px;max-height:32px;overflow:hidden}
  .arrow{align-self:center;color:var(--dim);padding:0 8px}
  .addnode{padding:0 30px 30px}
  /* n8n-style floating node panel */
  .backdrop{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:4}
  .modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;
    width:min(1080px,95vw);height:min(560px,86vh);background:var(--panel);border:1px solid var(--line);
    box-shadow:0 24px 70px rgba(0,0,0,.6);display:grid;grid-template-rows:auto 1fr auto}
  .mhead{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line)}
  .mtitle{color:var(--ink)} .mhead .nt{color:var(--dim);font-size:11px;flex:1}
  .mcols{display:grid;grid-template-columns:1fr 1.2fr 1.1fr;min-height:0}
  .mcol{display:flex;flex-direction:column;border-right:1px solid var(--line);min-height:0}
  .mcol:last-child{border-right:0}
  .chead{padding:7px 12px;color:var(--dim);font-size:11px;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--line)}
  .mbody{padding:10px 12px;overflow:auto;flex:1;white-space:pre-wrap;word-break:break-word}
  .mcol textarea{height:100%;border:0;border-radius:0;min-height:0;background:var(--bg)}
  .mcol .pad{padding:10px 12px}
  .infield{margin-bottom:8px;cursor:pointer;border-radius:4px;padding:5px;border:1px solid transparent}
  .infield:hover{background:#1b1e22;border-color:var(--line)}
  .infield .ins{float:right;color:var(--dim);font-size:10px;opacity:0}
  .infield:hover .ins{opacity:1}
  .intag{color:var(--pin);font-size:11px;text-decoration:underline;text-decoration-style:dotted}
  /* read-only value display (NOT an input) */
  .inval{background:var(--panel2);border-left:2px solid var(--line);border-radius:0;padding:5px 8px;margin-top:4px;font-size:12px;white-space:pre-wrap;word-break:break-word;color:var(--dim);user-select:text}
  .out.err{color:var(--bad)}
  .mfoot{padding:6px 14px;border-top:1px solid var(--line);min-height:0}
  /* raw */
  .raw textarea{height:calc(100vh - 98px);width:100%;border:0;border-radius:0}
</style></head>
<body>
<header><b>chain</b><span class="sub">create a project · edit a chain</span></header>

<!-- CREATE -->
<div id="create" class="wrap">
  <h2>Start a chain</h2>
  <div class="hint">Pick a folder, name a flow, create it — then edit.</div>
  <label>Target folder</label>
  <div class="row"><input id="dir" placeholder="/path/to/project"><button onclick="listFlows()">List</button></div>
  <div id="flows" class="flows hidden"></div>
  <label>New flow name</label>
  <div class="row"><input id="name" placeholder="my-flow" onkeydown="if(event.key==='Enter')createFlow()"><button class="primary" onclick="createFlow()">Create →</button></div>
  <div id="createMsg" class="msg"></div>
</div>

<!-- EDITOR -->
<div id="editor" class="hidden">
  <div class="bar">
    <button onclick="back()">← projects</button>
    <span class="path" id="path"></span>
    <button onclick="toggleRaw()" id="rawBtn">{ } raw</button>
    <select id="profile"><option value="">default (claude -p)</option><option value="fake">fake (offline)</option></select>
    <button class="primary" onclick="runAll()">▷ Run all</button>
  </div>

  <!-- canvas -->
  <div id="nodeView" class="stage">
    <div id="graph" class="flowrow"></div>
    <div class="addnode"><button onclick="addNode()">+ add ai step</button></div>
    <div id="canvasMsg" class="msg" style="padding:0 30px"></div>

    <!-- floating node panel (n8n style) -->
    <div id="modal" class="hidden">
      <div class="backdrop" onclick="closeNode()"></div>
      <div class="modal">
        <div class="mhead">
          <span class="mtitle">node · <span id="pnId"></span></span>
          <span class="nt" id="pnType"></span>
          <button class="primary" onclick="runNode()">▷ Run to here</button>
          <button onclick="runNode(true)" title="ignore cache, call the model again">↻ re-run</button>
          <button onclick="saveNode()">Save</button>
          <button onclick="deleteNode()">delete</button>
          <button onclick="closeNode()">✕ close</button>
        </div>
        <div class="mcols">
          <div class="mcol">
            <div class="chead">input</div>
            <div class="mbody">
              <label style="margin-top:0">from (first = <span class="intag">$json</span>)</label>
              <input id="pnFrom" spellcheck="false" placeholder="e.g. draft, other">
              <div style="margin-top:10px" id="pnInput" class="dim">Run to see what feeds this node.</div>
            </div>
          </div>
          <div class="mcol">
            <div class="chead">prompt (template)</div>
            <textarea id="pnPrompt" spellcheck="false" oninput="schedulePreview()" placeholder="write the prompt for this step…" style="flex:1 1 58%"></textarea>
            <div class="chead" style="border-top:1px solid var(--line)">fx rendered — input filled in</div>
            <div id="pnRendered" class="mbody" style="flex:0 0 42%;color:var(--ran);background:rgba(93,176,126,.05)">— run upstream (▷ Run to here) to fill {{ }} —</div>
          </div>
          <div class="mcol">
            <div class="chead">output <span id="pnOutStatus" style="float:right;text-transform:none;letter-spacing:0"></span></div>
            <div id="pnOut" class="mbody dim">Run to see this node's output.</div>
          </div>
        </div>
        <div class="mfoot"><span id="pnMsg" class="msg" style="margin:0"></span></div>
      </div>
    </div>
  </div>

  <!-- raw -->
  <div id="rawView" class="raw hidden">
    <textarea id="yaml" spellcheck="false"></textarea>
    <div class="bar"><button class="primary" onclick="saveRaw()">Save raw YAML</button><span id="rawMsg" class="msg" style="margin:0"></span></div>
  </div>
</div>

<script>
const $=(id)=>document.getElementById(id);
const api=(u,o)=>fetch(u,o).then(async r=>({ok:r.ok,status:r.status,data:await r.json().catch(()=>({}))}));
const esc=s=>(s==null?"":String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const errs=d=>(d.errors||[]).map(e=>"✗ "+e.node+": "+e.message).join("\n");
const G={ran:"✓",cached:"⊘",failed:"✗",skipped:"–",pending:"○",running:"◌"};
let current=null,nodes=[],selected=null,results={},previewTimer=null;
// transitive upstream of a node (its input cone)
function ancestors(id){const set=new Set();let stack=[...(nodes.find(n=>n.id===id)?.from||[])];
  while(stack.length){const c=stack.pop();if(set.has(c))continue;set.add(c);const n=nodes.find(x=>x.id===c);if(n)stack=stack.concat(n.from||[]);}return [...set];}
function setRunningUI(ids){ids.forEach(id=>results[id]={status:"running"});renderGraph();}

async function boot(){const{data}=await api("/api/context");$("dir").value=data.cwd;if(data.initialFlow)return open(data.initialFlow);listFlows();}
async function listFlows(){
  const{data}=await api("/api/list?dir="+encodeURIComponent($("dir").value));
  $("dir").value=data.dir;const box=$("flows");box.classList.remove("hidden");
  if(!data.flows.length){box.innerHTML='<div class="empty">empty — create your first flow below</div>';return;}
  box.innerHTML=data.flows.map(f=>'<div class="flow" data-f="'+f+'">'+f+'</div>').join("");
  box.querySelectorAll(".flow").forEach(el=>el.onclick=()=>open(data.dir.replace(/\/$/,"")+"/"+el.dataset.f));
}
async function createFlow(){
  const name=$("name").value.trim();if(!name)return setMsg("createMsg","err","name required");
  const{ok,data}=await api("/api/create",{method:"POST",body:JSON.stringify({dir:$("dir").value,name})});
  if(!ok)return setMsg("createMsg","err",data.error||"create failed");open(data.path);
}
async function open(path){current=path;selected=null;results={};$("path").textContent=path;
  $("create").classList.add("hidden");$("editor").classList.remove("hidden");showNodes();await loadNodes();}
function back(){$("editor").classList.add("hidden");$("create").classList.remove("hidden");listFlows();}

async function loadNodes(){
  const{ok,data}=await api("/api/parse?path="+encodeURIComponent(current));
  if(!ok){setMsg("canvasMsg","err","could not parse — use { } raw to fix it");$("graph").innerHTML="";return;}
  setMsg("canvasMsg","","");nodes=data.nodes;renderGraph();
}
function renderGraph(){
  const g=$("graph");g.innerHTML="";
  nodes.forEach((n,i)=>{
    if(i>0){const a=document.createElement("div");a.className="arrow";a.textContent="→";g.appendChild(a);}
    const r=results[n.id];
    const d=document.createElement("div");d.className="node "+(r?r.status:"");
    const glyph=r?('<span class="glyph g-'+r.status+(r.status==="running"?" spin":"")+'">'+G[r.status]+'</span>'):'<span class="glyph g-pending">○</span>';
    d.innerHTML='<button class="noderun" title="run to here" onclick="event.stopPropagation();runTo(\''+n.id+'\')">▷</button>'
      +'<div class="nh">'+glyph+'<span class="nn">'+n.id+'</span><span class="nt">'+n.type+'</span></div>'
      +'<div class="npreview">'+esc((n.prompt||n.run||"").slice(0,70))+'</div>';
    d.onclick=()=>selectNode(n.id);g.appendChild(d);
  });
}
function selectNode(id){
  selected=id;const n=nodes.find(x=>x.id===id);if(!n)return;
  $("modal").classList.remove("hidden");
  $("pnId").textContent=n.id;$("pnType").textContent=n.type;
  const isCmd=n.type==="cmd";
  $("pnPrompt").value=isCmd?(n.run||""):(n.prompt||"");
  $("pnFrom").value=(n.from||[]).join(", ");
  // INPUT: each upstream's last output
  const ups=n.from||[];
  $("pnInput").innerHTML = !ups.length
    ? '<span class="dim">no upstream — this is a start node</span>'
    : ups.map((u,i)=>{const r=results[u];const tag=i===0?'$json':('$node["'+u+'"]');
        const val=r?esc(r.output||r.error||"(empty)"):'<span class="dim">(run to see)</span>';
        return '<div class="infield" onclick="insertVar(\''+u+'\','+(i===0)+')" title="click to insert into the prompt">'
          +'<span class="ins">↵ insert</span><span class="intag">'+tag+'</span> ← '+u
          +'<div class="inval">'+val+'</div></div>';}).join("");
  // OUTPUT
  const ro=results[n.id];
  $("pnOut").className="mbody"+(ro&&ro.status==="failed"?" out err":(ro&&ro.status==="running"?" dim":(ro?"":" dim")));
  $("pnOut").textContent=ro?(ro.status==="running"?"running…":(ro.error||ro.output||"(empty)")):"Run to see this node's output.";
  const lab={ran:'<span class="g-ran">✓ ran · called the model</span>',cached:'<span class="g-cached">⊘ cached · reused, no call</span>',failed:'<span class="g-failed">✗ failed</span>',skipped:'<span class="g-skipped">– skipped</span>',running:'<span class="g-running">◌ running…</span>'};
  $("pnOutStatus").innerHTML=ro?(lab[ro.status]||""):"";
  setMsg("pnMsg","","");renderPreview();
}
function schedulePreview(){clearTimeout(previewTimer);previewTimer=setTimeout(renderPreview,350);}
async function renderPreview(){
  if(!selected)return;const n=nodes.find(x=>x.id===selected);
  if(!n||n.type!=="ai"){$("pnRendered").textContent="(rendered preview is for ai steps)";return;}
  const{ok,data}=await api("/api/render",{method:"POST",body:JSON.stringify({path:current,node:selected,template:$("pnPrompt").value})});
  if(!ok)return;
  if(data.noUpstream){$("pnRendered").textContent=data.rendered||"(empty)";return;}
  $("pnRendered").className="mbody";$("pnRendered").style.color="var(--ran)";
  $("pnRendered").innerHTML=esc(data.rendered)+(data.haveInputs?"":'<div class="dim" style="margin-top:6px;color:var(--dim)">↑ {{ }} stay literal until you ▷ Run to here (fills from real input)</div>');
}
function closeNode(){selected=null;$("modal").classList.add("hidden");}
async function saveNode(){
  const n=nodes.find(x=>x.id===selected);if(!n)return;
  const field=n.type==="cmd"?"run":"prompt";
  let r=await api("/api/set",{method:"POST",body:JSON.stringify({path:current,node:selected,field,value:$("pnPrompt").value})});
  if(!r.ok)return setMsg("pnMsg","err",errs(r.data)||"save failed");
  r=await api("/api/set-from",{method:"POST",body:JSON.stringify({path:current,node:selected,from:$("pnFrom").value})});
  if(!r.ok)return setMsg("pnMsg","err",errs(r.data)||"save failed");
  setMsg("pnMsg","ok","saved ✓");await loadNodes();selectNode(selected);
}
// read an NDJSON stream, calling onNode for each node result as it arrives
async function streamRun(url,bodyObj){
  const r=await fetch(url,{method:"POST",body:JSON.stringify(bodyObj)});
  if(!r.ok)return{ok:false,data:await r.json().catch(()=>({}))};
  const reader=r.body.getReader(),dec=new TextDecoder();let buf="";
  while(true){const{done,value}=await reader.read();if(done)break;
    buf+=dec.decode(value,{stream:true});let i;
    while((i=buf.indexOf("\n"))>=0){const line=buf.slice(0,i).trim();buf=buf.slice(i+1);if(line){try{onNode(JSON.parse(line));}catch(e){}}}}
  return{ok:true};
}
function onNode(rec){
  if(rec.error&&!rec.id){setMsg("canvasMsg","err",rec.error);return;}
  results[rec.id]={status:rec.status,output:rec.output,error:rec.error};
  renderGraph();                       // each node flips the instant it finishes
  if(selected===rec.id)selectNode(selected);
}
async function runNode(force){
  if(!selected)return;
  $("pnOut").className="mbody dim";$("pnOut").textContent="running…";$("pnOutStatus").innerHTML='<span class="g-running">◌ running…</span>';
  setRunningUI([selected,...ancestors(selected)]);
  const r=await streamRun("/api/run-node",{path:current,node:selected,profile:$("profile").value,fresh:!!force});
  if(!r.ok){renderGraph();return setMsg("pnMsg","err",errs(r.data)||"run failed");}
}
// run-to-here straight from a node's ▷ button (no panel needed)
async function runTo(id){
  setRunningUI([id,...ancestors(id)]);
  const r=await streamRun("/api/run-node",{path:current,node:id,profile:$("profile").value});
  if(!r.ok){results={};renderGraph();return setMsg("canvasMsg","err",errs(r.data)||"run failed");}
}
// click a variable in INPUT → insert it into the prompt at the cursor (no typos)
function insertVar(id,primary){
  const expr=primary?'{{ $json }}':'{{ $node["'+id+'"] }}';
  const ta=$("pnPrompt");const s=ta.selectionStart??ta.value.length,e=ta.selectionEnd??s;
  ta.value=ta.value.slice(0,s)+expr+ta.value.slice(e);
  ta.focus();ta.selectionStart=ta.selectionEnd=s+expr.length;
  schedulePreview();
}
async function deleteNode(){
  if(!selected)return;
  const{ok,data}=await api("/api/delete-node",{method:"POST",body:JSON.stringify({path:current,node:selected})});
  if(!ok)return setMsg("pnMsg","err",errs(data)||"delete failed");
  closeNode();await loadNodes();
}
async function addNode(){
  const read=await api("/api/read?path="+encodeURIComponent(current));
  let y=read.data.yaml||"";let i=1,id;do{id="step"+(nodes.length+i);i++;}while(nodes.some(n=>n.id===id));
  const last=nodes.length?nodes[nodes.length-1].id:null;
  y=y.replace(/\s*$/,"\n")+"  "+id+":\n    type: ai\n"+(last?("    from: "+last+"\n"):"")+"    prompt: 'new step'\n";
  const{ok}=await api("/api/save",{method:"POST",body:JSON.stringify({path:current,yaml:y})});
  if(!ok)return setMsg("canvasMsg","err","add failed");await loadNodes();selectNode(id);
}
async function runAll(){
  setRunningUI(nodes.map(n=>n.id));
  const r=await streamRun("/api/run",{path:current,profile:$("profile").value});
  if(!r.ok){results={};renderGraph();return setMsg("canvasMsg","err",errs(r.data)||"run failed");}
}
let rawOn=false;
async function toggleRaw(){rawOn=!rawOn;
  if(rawOn){const{data}=await api("/api/read?path="+encodeURIComponent(current));$("yaml").value=data.yaml||"";
    $("nodeView").classList.add("hidden");$("rawView").classList.remove("hidden");$("rawBtn").textContent="◧ nodes";}
  else{showNodes();loadNodes();}
}
function showNodes(){rawOn=false;$("rawView").classList.add("hidden");$("nodeView").classList.remove("hidden");$("rawBtn").textContent="{ } raw";}
async function saveRaw(){const{ok,data}=await api("/api/save",{method:"POST",body:JSON.stringify({path:current,yaml:$("yaml").value})});
  setMsg("rawMsg",ok?"ok":"err",ok?"saved ✓":errs(data));}
function setMsg(id,cls,t){const e=$(id);if(!e)return;e.className="msg "+cls;e.textContent=t;}
window.addEventListener("keydown",e=>{if(e.key==="Escape"&&!$("modal").classList.contains("hidden"))closeNode();});
boot();
</script>
</body></html>
